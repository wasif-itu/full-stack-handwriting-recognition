<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Text Recognizer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1d2430;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(980px, calc(100vw - 32px));
        display: grid;
        gap: 18px;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: end;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
      }

      .status {
        min-height: 22px;
        color: #4d5b6b;
        font-size: 14px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 18px;
      }

      .panel {
        background: #ffffff;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        padding: 16px;
        min-height: 360px;
      }

      .preview {
        display: grid;
        gap: 14px;
        align-content: start;
      }

      input[type="file"] {
        width: 100%;
      }

      img {
        width: 100%;
        max-height: 520px;
        object-fit: contain;
        border: 1px solid #e2e6ee;
        background: #fbfcfe;
      }

      button {
        width: fit-content;
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        background: #1768ac;
        color: white;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        background: #9aa8b8;
        cursor: wait;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.45;
        font-size: 15px;
      }

      @media (max-width: 760px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        header {
          align-items: start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Text Recognizer</h1>
          <div class="status" id="status">Choose an image to recognize handwritten text.</div>
        </div>
        <button id="predict" disabled>Predict</button>
      </header>

      <section class="workspace">
        <div class="panel preview">
          <input id="image" type="file" accept="image/png,image/jpeg" />
          <img id="preview" alt="Selected image preview" hidden />
        </div>
        <div class="panel">
          <pre id="output">Prediction will appear here.</pre>
        </div>
      </section>
    </main>

    <script>
      const baseUrl = "https://ajqmhubrppdy65qq5hkbqxkfme0evvni.lambda-url.us-east-1.on.aws";
      const imageInput = document.querySelector("#image");
      const preview = document.querySelector("#preview");
      const predictButton = document.querySelector("#predict");
      const output = document.querySelector("#output");
      const status = document.querySelector("#status");

      let selectedFile = null;

      imageInput.addEventListener("change", () => {
        selectedFile = imageInput.files[0] || null;
        predictButton.disabled = !selectedFile;
        output.textContent = "Prediction will appear here.";

        if (!selectedFile) {
          preview.hidden = true;
          status.textContent = "Choose an image to recognize handwritten text.";
          return;
        }

        preview.src = URL.createObjectURL(selectedFile);
        preview.hidden = false;
        status.textContent = selectedFile.name;
      });

      predictButton.addEventListener("click", async () => {
        if (!selectedFile) return;

        predictButton.disabled = true;
        status.textContent = "Predicting... cold starts can take around 2 minutes.";
        output.textContent = "";

        const formData = new FormData();
        formData.append("image", selectedFile, selectedFile.name);

        try {
          const response = await fetch(`${baseUrl}/predict`, {
            method: "POST",
            body: formData,
          });
          const payload = await response.json();

          if (payload.success) {
            output.textContent = payload.prediction;
            status.textContent = "Done.";
          } else {
            output.textContent = payload.error || "Prediction failed.";
            status.textContent = "Prediction failed.";
          }
        } catch (error) {
          output.textContent = String(error);
          status.textContent = "Request failed.";
        } finally {
          predictButton.disabled = false;
        }
      });
    </script>
  </body>
</html>
